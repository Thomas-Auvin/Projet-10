services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projet10-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./vector_db:/app/vector_db
      - ./outputs:/app/outputs
      - ./evals:/app/evals
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s